services:
  - type: web
    name: poker-web-game
    runtime: node
    nodeVersion: "22.16.0"
    region: oregon
    plan: free
    buildCommand: cd server && npm install && cd ../client && npm install && npm run build
    startCommand: NODE_ENV=production node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
